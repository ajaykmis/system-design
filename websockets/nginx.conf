upstream ws_servers {
    # Round-robin across server instances.
    # WebSocket connections are sticky by nature (persistent TCP) —
    # once upgraded, all frames go to the same backend.
    server server1:8080;
    server server2:8080;
}

server {
    listen 8080;

    location / {
        proxy_pass http://ws_servers;

        # Required for WebSocket proxying
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;

        # Forward real client IP
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive (chat sessions can be long)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
