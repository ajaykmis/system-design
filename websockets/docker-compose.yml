services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server1:
    build:
      context: ..          # root of the repo (where go.mod lives)
      dockerfile: websockets/Dockerfile
    environment:
      SERVER_ID: server-1
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  server2:
    build:
      context: ..
      dockerfile: websockets/Dockerfile
    environment:
      SERVER_ID: server-2
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8090:8080"        # port 8090 to avoid conflicts
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server1
      - server2
