services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emaildb
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8083:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/emaildb?sslmode=disable
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/uploads   # shared with campaign worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Transactional worker — high priority, dedicated process
  worker-transactional:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/emaildb?sslmode=disable
      REDIS_URL: redis://redis:6379
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Campaign worker — streams file line-by-line, fans out to queue:promotional
  worker-campaign:
    build:
      context: .
      dockerfile: Dockerfile.campaign
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/emaildb?sslmode=disable
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/uploads   # reads the same file the marketing service dropped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Promotional worker — scaled separately, won't starve transactional
  worker-promotional:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/emaildb?sslmode=disable
      REDIS_URL: redis://redis:6379
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

volumes:
  pgdata:
  uploads:   # shared volume: marketing service writes, campaign worker reads
